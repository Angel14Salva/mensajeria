<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensajes</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="user-info">
          <div class="avatar-sm" id="myAvatar">--</div>
          <span id="myUsername">Cargando...</span>
        </div>
        <button class="icon-btn" id="logoutBtn" title="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar usuario..." autocomplete="off"/>
        <div id="searchResults" class="search-results hidden"></div>
      </div>

      <div class="section-label">Conversaciones</div>
      <div class="chat-list" id="chatList">
        <div class="empty-state">No hay conversaciones aún.<br>Busca un usuario para empezar.</div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="main" id="mainArea">
      <div class="empty-chat">
        <svg width="48" height="48" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.25">
          <rect width="36" height="36" rx="10" fill="#378ADD"/>
          <path d="M8 12C8 10.9 8.9 10 10 10H26C27.1 10 28 10.9 28 12V22C28 23.1 27.1 24 26 24H20L15 28V24H10C8.9 24 8 23.1 8 22V12Z" fill="white"/>
        </svg>
        <p>Selecciona una conversación</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
