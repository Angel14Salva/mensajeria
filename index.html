<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensajes — Login</title>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="#378ADD"/>
          <path d="M8 12C8 10.9 8.9 10 10 10H26C27.1 10 28 10.9 28 12V22C28 23.1 27.1 24 26 24H20L15 28V24H10C8.9 24 8 23.1 8 22V12Z" fill="white"/>
        </svg>
      </div>
      <h1>Bienvenido</h1>
      <p class="subtitle">Inicia sesión para continuar</p>
      <div id="errorMsg" class="error-msg hidden"></div>
      <form id="loginForm">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email"/>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" id="loginBtn" class="btn-primary">
          <span id="loginText">Ingresar</span>
          <span id="loginSpinner" class="spinner hidden"></span>
        </button>
      </form>
    </div>
  </div>
  <script type="module">
    import { auth } from './js/firebase.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'chat.html'; });
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const text = document.getElementById('loginText');
      const spinner = document.getElementById('loginSpinner');
      const errorMsg = document.getElementById('errorMsg');
      btn.disabled = true; text.classList.add('hidden'); spinner.classList.remove('hidden'); errorMsg.classList.add('hidden');
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'chat.html';
      } catch (err) {
        errorMsg.textContent = 'Correo o contraseña incorrectos.';
        errorMsg.classList.remove('hidden');
        btn.disabled = false; text.classList.remove('hidden'); spinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
